<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSI · Trip planner</title>
<!--
  TSI Trip planner — STANDALONE PROTOTYPE.
  Not merged into tsi-intel.html yet; excluded from public serving via .assetsignore.

  What works (v0, no paid keys):
    • Add stops via Photon geocode autocomplete (name OR address; Search tab) or the mock Mills tab.
    • Stops are source-agnostic {id,label,lat,lon,kind,...}; kind ∈ mill|office|airport|station|hotel|place.
    • Drag to reorder (or ↑/↓). Per-leg mode car|plane. Fixed/flex timing + visit duration.
    • Timing walk engine: computes arrive/depart per node, inserts airport gateways + flight
      buffers for plane legs, handles hotel overnights, flags fixed-time conflicts.
    • Leaflet map (CDN; degrades offline) + a per-day timeline coloured by activity family.
    • getPrice() is a STUB (mock fares) — swap for a server-side Google-Flights scraper later.

  Merge path: replace MOCK_MILLS with getAccounts().accounts.filter(a=>a.lat&&a.lon),
  and route getLeg()/getPrice() through the tsi-intel-api worker. See BACKLOG.md.
-->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap');

/* ── TSI base tokens (copied from tsi-style/colors_and_type.css) ── */
:root{
  --tsi-deep-blue:rgb(25,68,108); --tsi-teal:rgb(0,146,159); --tsi-sage:rgb(128,152,72);
  --tsi-warm-white:rgb(250,248,244); --tsi-dried-wood:rgb(234,222,134); --tsi-deep-slate:rgb(18,26,36);
  --tsi-gray:rgb(100,100,100); --tsi-amber:rgb(196,162,48); --tsi-coral:rgb(192,82,52);
  --color-bg:rgb(250,248,244); --color-surface:rgb(255,255,255);
  --color-border:rgba(64,64,64,0.12); --color-border-mid:rgba(64,64,64,0.25);
  --color-text-primary:rgb(64,64,64); --color-text-secondary:rgb(100,100,100); --color-text-muted:rgb(150,150,150);
  --color-heading:rgb(25,68,108); --color-accent:rgb(0,146,159);
  --font-ui:'Inter',system-ui,sans-serif; --font-display:'DM Serif Display',Georgia,serif;
  --font-mono:'JetBrains Mono','Courier New',monospace;
  --sp-1:4px; --sp-2:8px; --sp-3:16px; --sp-4:24px;
  --radius-sm:4px; --radius-md:6px; --radius-lg:8px; --hair:0.5px; --tr:150ms ease;
  /* timeline activity families — 4 semantic groups, transit as lightness steps of teal */
  --tl-visit:rgb(128,152,72);        /* sage — the point of the trip            */
  --tl-drive:rgb(0,146,159);         /* teal — in motion                        */
  --tl-fly:rgb(1,94,107);            /* deep teal — flying                      */
  --tl-wait:rgb(167,211,217);        /* pale teal — airport/station waiting     */
  --tl-sleep:rgb(25,68,108);         /* deep blue — hotel / night               */
  --tl-flex:rgb(216,213,206);        /* warm gray — open / flex / beach         */
}
[data-theme="dark"]{
  --color-bg:rgb(18,26,36); --color-surface:rgb(26,38,52);
  --color-border:rgba(255,255,255,0.08); --color-border-mid:rgba(255,255,255,0.16);
  --color-text-primary:rgba(255,255,255,0.87); --color-text-secondary:rgba(255,255,255,0.55);
  --color-text-muted:rgba(255,255,255,0.35); --color-heading:rgb(0,186,200); --color-accent:rgb(0,186,200);
  --tl-drive:rgb(0,186,200); --tl-fly:rgb(0,120,134); --tl-wait:rgb(60,110,120); --tl-flex:rgb(52,64,78);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font-ui);font-size:15px;color:var(--color-text-primary);
  background:var(--color-bg);-webkit-font-smoothing:antialiased;overflow:hidden}
h1,h2,h3{font-weight:400;color:var(--color-heading);margin:0}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
button{font-family:var(--font-ui);cursor:pointer}
input,select{font-family:var(--font-ui);font-size:13px;color:var(--color-text-primary);
  background:var(--color-surface);border:1px solid var(--color-border-mid);border-radius:var(--radius-sm);
  padding:6px 8px;outline:none}
input:focus,select:focus{border-color:var(--color-accent)}
label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px}

/* ── shell ── */
.app{display:flex;flex-direction:column;height:100%}
.hdr{height:48px;flex-shrink:0;background:var(--tsi-deep-slate);display:flex;align-items:center;
  gap:12px;padding:0 16px;color:#fff}
.hdr .brand{font-family:var(--font-display);font-size:18px;color:#fff;letter-spacing:.2px}
.hdr .brand b{color:var(--tsi-dried-wood);font-weight:400}
.hdr .stamp{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.4)}
.hdr .spacer{flex:1}
.hdr button{background:transparent;border:var(--hair) solid rgba(255,255,255,.3);color:rgba(255,255,255,.85);
  border-radius:var(--radius-sm);padding:5px 10px;font-size:12px}
.hdr button:hover{border-color:rgba(255,255,255,.6)}
.body{flex:1;display:grid;grid-template-columns:380px 1fr;min-height:0}
@media(max-width:820px){.body{grid-template-columns:1fr;overflow:auto}}

/* ── left rail ── */
.rail{border-right:var(--hair) solid var(--color-border-mid);overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:16px;background:var(--color-surface)}
.card{border:var(--hair) solid var(--color-border-mid);border-radius:var(--radius-lg);padding:14px;background:var(--color-surface)}
.card > h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-secondary);
  margin-bottom:10px;font-weight:500}
.card-head{display:flex;justify-content:space-between;align-items:center}
.card-head > h3{margin-bottom:0}
.mini-btn{background:transparent;border:var(--hair) solid var(--tsi-teal);color:var(--tsi-teal);
  border-radius:var(--radius-sm);padding:4px 9px;font-size:11px}
.mini-btn:hover{background:var(--tsi-teal);color:#fff}
#optNote{margin:8px 0 4px}
#optNote.live{color:var(--tsi-sage)}
.trip-actions{display:flex;gap:6px;margin-top:8px}
.trip-actions button{flex:1;background:transparent;border:var(--hair) solid var(--color-border-mid);
  color:var(--color-text-secondary);border-radius:var(--radius-sm);padding:5px 6px;font-size:11px}
.trip-actions button:hover{border-color:var(--tsi-teal);color:var(--tsi-teal)}
.saved-note{font-size:10px;color:var(--color-text-muted);margin-top:6px;font-family:var(--font-mono)}
.options-bar{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;align-items:center}
.opt-chip{display:inline-flex;align-items:center;gap:5px;background:var(--color-bg);border:var(--hair) solid var(--color-border-mid);
  border-radius:14px;padding:3px 6px 3px 10px;font-size:11.5px;cursor:pointer;color:var(--color-text-primary)}
.opt-chip:hover{border-color:var(--tsi-teal)}
.opt-chip .opt-t{font-family:var(--font-mono);font-size:10px;color:var(--tsi-teal)}
.opt-chip .opt-x{color:var(--color-text-muted);font-size:13px;line-height:1;padding:0 1px}
.opt-chip .opt-x:hover{color:var(--tsi-coral)}
.opt-add{background:transparent;border:var(--hair) dashed var(--color-border-mid);color:var(--color-text-secondary);
  border-radius:14px;padding:3px 10px;font-size:11px}
.opt-add:hover{border-color:var(--tsi-teal);color:var(--tsi-teal)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{margin-bottom:8px}
.field:last-child{margin-bottom:0}
.field input,.field select{width:100%}

/* add-stop */
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tabs button{flex:1;background:transparent;border:var(--hair) solid var(--color-border-mid);
  padding:6px;font-size:12px;color:var(--color-text-secondary);border-radius:var(--radius-sm)}
.tabs button.on{background:var(--tsi-teal);color:#fff;border-color:var(--tsi-teal)}
.search-wrap{position:relative}
.search-wrap input{width:100%}
.ac{position:absolute;left:0;right:0;top:100%;z-index:50;background:var(--color-surface);
  border:1px solid var(--color-border-mid);border-radius:var(--radius-sm);margin-top:2px;max-height:230px;
  overflow:auto;display:none}
.ac.show{display:block}
.ac .row{padding:7px 9px;font-size:12.5px;cursor:pointer;display:flex;gap:8px;align-items:center;
  border-bottom:var(--hair) solid var(--color-border)}
.ac .row:hover{background:var(--color-bg)}
.ac .row .k{font-size:10px;color:#fff;padding:1px 5px;border-radius:3px;flex-shrink:0}
.ac .row .sub{color:var(--color-text-muted);font-size:11px}
.ac .hint{padding:8px 9px;font-size:11px;color:var(--color-text-muted)}
.hint2{font-size:10px;color:var(--color-text-muted);margin-top:4px;line-height:1.45}
.hint2 b{font-weight:500}
.hint2 a{color:var(--tsi-teal)}
.hint2.live{color:var(--tsi-sage)}
.mill-row{padding:7px 9px;font-size:12.5px;cursor:pointer;display:flex;gap:8px;align-items:center;
  border:var(--hair) solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:4px}
.mill-row:hover{border-color:var(--tsi-teal)}
.mill-row .sub{color:var(--color-text-muted);font-size:11px;margin-left:auto}

/* itinerary list */
.stops{position:relative;display:flex;flex-direction:column;gap:0;padding-left:24px}
/* cluster grouping bar — connects consecutive stops in one car "leg" (split at flights) */
.cluster-bar{position:absolute;left:17px;width:4px;border-radius:2px;background:var(--tsi-teal);opacity:.5;cursor:grab}
.cluster-bar:hover,.cluster-lbl:hover{opacity:1}
.cluster-bar.gdrag,.cluster-lbl.gdrag{opacity:.3}
.cluster-bar.pinned{background:repeating-linear-gradient(180deg,var(--tsi-teal) 0 6px,transparent 6px 10px)}
.seg-pin{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--tsi-teal);
  border:var(--hair) solid var(--tsi-teal);border-radius:3px;padding:1px 3px 1px 4px}
.seg-pin svg{width:10px;height:10px}
.seg-pin .seg-x{cursor:pointer;color:var(--color-text-muted);font-size:12px;line-height:1}
.seg-pin .seg-x:hover{color:var(--tsi-coral)}
.cluster-lbl{position:absolute;left:1px;width:13px;writing-mode:vertical-rl;font-size:9px;letter-spacing:.02em;
  color:var(--tsi-teal);white-space:nowrap;overflow:hidden;opacity:.85;cursor:grab}
.leg{display:flex;align-items:center;gap:8px;padding:7px 0 7px 34px;font-size:11.5px;color:var(--color-text-secondary);position:relative}
.leg::before{content:'';position:absolute;left:21px;top:0;bottom:0;border-left:var(--hair) dashed var(--color-border-mid)}
.leg-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);flex-shrink:0}
.leg .modebtns{display:inline-flex;border:var(--hair) solid var(--color-border-mid);border-radius:var(--radius-sm);
  overflow:hidden;background:var(--color-surface)}
.leg .modebtns button{background:transparent;border:none;border-right:var(--hair) solid var(--color-border-mid);
  padding:3px 8px;font-size:11px;color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:4px}
.leg .modebtns button:last-child{border-right:none}
.leg .modebtns button svg{width:12px;height:12px}
.leg .modebtns button.on{background:var(--tsi-teal);color:#fff}
.leg .modebtns button.soon{color:var(--color-text-muted);cursor:not-allowed;font-style:italic}
.leg .dur{font-family:var(--font-mono);color:var(--color-text-secondary)}
.leg .price-btn{background:transparent;border:var(--hair) solid var(--tsi-teal);color:var(--tsi-teal);
  border-radius:3px;padding:2px 8px;font-size:10.5px;margin-left:auto}
.leg .price-btn:hover{background:var(--tsi-teal);color:#fff}
.stop{position:relative;display:flex;gap:10px;align-items:flex-start;padding:10px;border:var(--hair) solid var(--color-border-mid);
  border-radius:var(--radius-md);background:var(--color-surface);transition:border-color var(--tr)}
.stop.drag{opacity:.35}
/* drag insertion "ghost line" — a teal bar showing where the card will drop (borders only, no shadow) */
.stop.drop-above::before,.stop.drop-below::after{content:'';position:absolute;left:2px;right:2px;height:2px;
  background:var(--tsi-teal);border-radius:2px;z-index:6}
.stop.drop-above::before{top:-5px}
.stop.drop-below::after{bottom:-5px}
.stop .handle{cursor:grab;color:var(--color-text-muted);font-size:14px;line-height:1;padding-top:2px;user-select:none}
.stop .ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#fff}
.stop .ic svg{width:14px;height:14px}
.stop .main{flex:1;min-width:0}
.stop .nm{font-size:13.5px;color:var(--color-text-primary);width:100%;font-family:var(--font-ui);
  border:1px solid transparent;background:transparent;padding:1px 4px;border-radius:3px;text-overflow:ellipsis}
.stop .nm:hover{border-color:var(--color-border)}
.stop .nm:focus{border-color:var(--tsi-teal);background:var(--color-surface)}
.stop .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
.stop .meta select,.stop .meta input{font-size:11px;padding:3px 5px}
.stop .meta input.dur{width:52px;text-align:right}
.stop .meta .t{font-size:10px;color:var(--color-text-muted)}
.chip-fixed{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(25,68,108,.1);color:var(--tsi-deep-blue)}
.stop .rowbtns{display:flex;flex-direction:column;gap:2px}
.stop .x,.stop .dup{background:transparent;border:none;color:var(--color-text-muted);font-size:15px;line-height:1;padding:0 2px}
.stop .dup{font-size:12px}
.stop .x:hover{color:var(--tsi-coral)}
.stop .dup:hover{color:var(--tsi-teal)}
.stop .times{font-family:var(--font-mono);font-size:11px;color:var(--tsi-teal);margin-top:4px;white-space:nowrap}
.stop .warn{font-size:11px;color:var(--tsi-coral);margin-top:4px}
.empty{font-size:12.5px;color:var(--color-text-muted);text-align:center;padding:18px 8px;line-height:1.5}

/* ── right pane ── */
.pane{display:flex;flex-direction:column;min-height:0;min-width:0}
#map{height:44%;min-height:200px;background:var(--color-bg);border-bottom:var(--hair) solid var(--color-border-mid)}
.map-off{height:100%;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);font-size:12px}
.tl{flex:1;overflow:auto;padding:14px 16px;min-height:0}
.tl-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.tl-head h2{font-family:var(--font-display);font-size:20px}
.tl-total{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary)}
.daytabs{display:flex;gap:4px;flex-wrap:wrap}
.daytabs button{background:var(--color-surface);border:var(--hair) solid var(--color-border-mid);
  padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;color:var(--color-text-secondary)}
.daytabs button .d{font-family:var(--font-mono)}
.daytabs button.on{background:var(--tsi-deep-blue);color:#fff;border-color:var(--tsi-deep-blue)}
.daytabs button.on .d{color:#fff}

/* timeline column */
.tlcol{position:relative;margin-left:52px;border-left:var(--hair) solid var(--color-border-mid)}
.tlhour{position:absolute;left:-52px;width:46px;text-align:right;font-family:var(--font-mono);font-size:10px;
  color:var(--color-text-muted);transform:translateY(-6px)}
.tlgrid{position:absolute;left:0;right:0;border-top:var(--hair) dashed var(--color-border)}
.block{position:absolute;left:8px;right:8px;border-radius:var(--radius-sm);padding:4px 8px;overflow:hidden;
  color:#fff;font-size:11.5px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;
  border:var(--hair) solid rgba(0,0,0,.08)}
.block .bt{font-family:var(--font-mono);font-size:10px;opacity:.85}
.block .bl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block.visit{background:var(--tl-visit)}
.block.drive{background:var(--tl-drive)}
.block.fly{background:var(--tl-fly)}
.block.wait{background:var(--tl-wait);color:var(--color-text-primary)}
.block.sleep{background:var(--tl-sleep)}
.block.flex{background:var(--tl-flex);color:var(--color-text-secondary);border-style:dashed}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--color-text-secondary)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:11px;height:11px;border-radius:2px;display:inline-block}

/* price popover */
.pop{position:fixed;z-index:400;background:var(--color-surface);border:1px solid var(--color-border-mid);
  border-radius:var(--radius-md);padding:12px;width:260px;display:none}
.pop.show{display:block}
.pop h4{font-size:12px;color:var(--color-heading);margin:0 0 8px;font-weight:500}
.pop .fl{display:flex;justify-content:space-between;padding:6px 0;border-top:var(--hair) solid var(--color-border);font-size:12px}
.pop .fl .car{color:var(--color-text-secondary)}
.pop .fl .pr{font-family:var(--font-mono);color:var(--color-heading)}
.pop .stub{font-size:10px;color:var(--tsi-amber);margin-top:8px}
.pop .close{position:absolute;top:6px;right:8px;background:transparent;border:none;color:var(--color-text-muted);font-size:15px}
.btn-primary{background:var(--tsi-teal);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;width:100%}
.btn-primary:hover{background:var(--tsi-deep-blue)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="brand">TSI <b>·</b> Trip planner</span>
    <span class="stamp" id="stamp"></span>
    <span class="spacer"></span>
    <button onclick="loadDemo()">Load demo trip</button>
    <button onclick="toggleTheme()" id="themebtn">Dark</button>
  </div>
  <div class="body">
    <!-- LEFT RAIL -->
    <div class="rail">
      <div class="card">
        <div class="card-head"><h3>Trips</h3>
          <button class="mini-btn" onclick="newTrip()" title="Start a new empty trip">+ New</button></div>
        <div class="field"><select id="tripSelect" onchange="switchTrip(this.value)"></select></div>
        <div class="trip-actions">
          <button onclick="saveAsNewTrip()" title="Save the current trip under a new name">Save as…</button>
          <button onclick="duplicateTrip()" title="Duplicate this trip">Duplicate</button>
          <button onclick="deleteTrip()" title="Delete this trip">Delete</button>
        </div>
        <div class="saved-note" id="savedNote"></div>
      </div>

      <div class="card">
        <h3>Trip</h3>
        <div class="field"><label>Trip name</label><input id="tripName" value="Mill visits — DE/NL" oninput="onTripName()"></div>
        <div class="grid2">
          <div class="field"><label>Start date</label><input type="date" id="startDate" onchange="recompute()"></div>
          <div class="field"><label>Start time</label><input type="time" id="startTime" value="08:00" onchange="recompute()"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Flight buffer — before</label>
            <select id="bufPre" onchange="recompute()">
              <option value="60">1h 00m</option><option value="90" selected>1h 30m</option>
              <option value="120">2h 00m</option><option value="150">2h 30m</option></select></div>
          <div class="field"><label>Flight buffer — after</label>
            <select id="bufPost" onchange="recompute()">
              <option value="20">0h 20m</option><option value="30" selected>0h 30m</option>
              <option value="45">0h 45m</option><option value="60">1h 00m</option></select></div>
        </div>
        <div class="field" style="margin-top:8px">
          <label>Drive times — OpenRouteService key (optional)</label>
          <input id="orsKey" placeholder="paste a free ORS key for live road times" oninput="onOrsKey()" autocomplete="off">
          <div id="orsStatus" class="hint2"></div>
        </div>
      </div>

      <div class="card">
        <h3>Add stop</h3>
        <div class="tabs">
          <button id="tabSearch" class="on" onclick="setTab('search')">Search</button>
          <button id="tabMills" onclick="setTab('mills')">Mills</button>
        </div>
        <div id="paneSearch">
          <div class="search-wrap">
            <input id="geo" placeholder="Search by name or address…" autocomplete="off"
              oninput="onGeoInput()" onfocus="onGeoInput()">
            <div class="ac" id="ac"></div>
          </div>
        </div>
        <div id="paneMills" style="display:none"></div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Itinerary</h3>
          <button class="mini-btn" onclick="suggestOrder()" title="Reorder stops to minimise travel time — keeps your first stop as the origin and fixed appointments in order">↳ Optimise order</button>
        </div>
        <div id="optNote" class="hint2"></div>
        <div class="options-bar" id="optionsBar"></div>
        <div class="stops" id="stops"></div>
      </div>
    </div>

    <!-- RIGHT PANE -->
    <div class="pane">
      <div id="map"></div>
      <div class="tl">
        <div class="tl-head">
          <h2>Timeline</h2>
          <span class="tl-total" id="tlTotal"></span>
          <div class="daytabs" id="daytabs"></div>
        </div>
        <div id="tlbody"></div>
        <div class="legend">
          <span><i style="background:var(--tl-visit)"></i>Visiting</span>

</div>

/* mock mills — the DB seam. Later: getAccounts().accounts.filter(a=>a.lat&&a.lon) */

const AIRPORTS = [

/* ── state ─────────────────────────────────────────────────── */
let stops = [];          // [{id,label,lat,lon,kind,timing,duration,arriveBy,mode}]

/* ── geometry / time helpers ───────────────────────────────── */
function haversine(a,b){
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function nearestAirport(pt){
  let best=AIRPORTS[0], bd=Infinity;
  for(const a of AIRPORTS){ const d=haversine(pt,a); if(d<bd){bd=d;best=a;} }
  return best;
}
const pad=n=>String(n).padStart(2,'0');
function fmtTime(d){ return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDur(m){ m=Math.round(m); const h=Math.floor(m/60), r=m%60;
  return h?(r?`${h}h ${pad(r)}m`:`${h}h`):`${r}m`; }
function fmtDayLabel(d){ return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function startDateTime(){
  const ds=document.getElementById('startDate').value || todayISO();
  const ts=document.getElementById('startTime').value || '08:00';
  return new Date(ds+'T'+ts);
}
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addMin(d,m){ return new Date(d.getTime()+m*60000); }
function dayKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

/* ── the timing walk — single source of truth for both list & timeline ── */
function computeItinerary(){
  const iv=[];                       // {start,end,cat,title,sub,stopId}
  const legInfo={};                  // stopId -> {mode,minutes,label} (travel arriving TO it)
  const warn={};                     // stopId -> warning string
  if(!stops.length) return {iv,legInfo,warn,end:null};
  let cur = startDateTime();
  const bufPre = +document.getElementById('bufPre').value;
  const bufPost= +document.getElementById('bufPost').value;

  stops.forEach((s,i)=>{
    if(i>0){
      const prev=stops[i-1];
      if(s.mode==='plane'){
        const dep=nearestAirport(prev), arr=nearestAirport(s);
        const toDep=haversine(prev,dep)/CAR_KMH*60;
        const flight=haversine(dep,arr)/PLANE_KMH*60 + PLANE_OVERHEAD_MIN;
        const fromArr=haversine(arr,s)/CAR_KMH*60;
        let t0=cur;
        let e=addMin(t0,toDep);  iv.push({start:t0,end:e,cat:'drive',title:`Drive to ${dep.iata}`,sub:`${Math.round(haversine(prev,dep))} km`}); t0=e;
        e=addMin(t0,bufPre);     iv.push({start:t0,end:e,cat:'wait', title:`${dep.iata} — check-in & security`,sub:fmtDur(bufPre)}); t0=e;
        e=addMin(t0,flight);     iv.push({start:t0,end:e,cat:'fly',  title:`Fly ${dep.iata} → ${arr.iata}`,sub:`${Math.round(haversine(dep,arr))} km`}); t0=e;
        e=addMin(t0,bufPost);    iv.push({start:t0,end:e,cat:'wait', title:`${arr.iata} — deplane & pickup`,sub:fmtDur(bufPost)}); t0=e;
        e=addMin(t0,fromArr);    iv.push({start:t0,end:e,cat:'drive',title:`Drive to ${s.label}`,sub:`${Math.round(haversine(arr,s))} km`}); t0=e;
        cur=t0;
        legInfo[s.id]={mode:'plane',minutes:toDep+bufPre+flight+bufPost+fromArr,label:`${dep.iata}→${arr.iata}`,dep,arr};
      } else {
        const rc=roadCache[roadKey(prev,s)];
        const km=rc?rc.km:haversine(prev,s);
        const mins=rc?rc.min:km/CAR_KMH*60;
        const e=addMin(cur,mins);
        iv.push({start:cur,end:e,cat:'drive',title:`Drive to ${s.label}`,sub:`${Math.round(km)} km${rc?'':' (est)'}`});
        cur=e;
        legInfo[s.id]={mode:'car',minutes:mins,label:`${Math.round(km)} km`,est:!rc};
      }
    }
    // arrival = cur. handle fixed appointments (wait or conflict)
    let arrival=cur;
    if(s.timing==='fixed' && s.arriveBy){
      const want=new Date(dayKey(arrival)+'T'+s.arriveBy);
      // if the appointment time is earlier today than arrival, it's a real conflict
      if(want.getTime() < arrival.getTime()-1){
        warn[s.id]=`Arrives ${fmtTime(arrival)} — ${fmtDur((arrival-want)/60000)} after the ${s.arriveBy} appointment`;
      } else if(want.getTime() > arrival.getTime()+1){
        iv.push({start:arrival,end:want,cat:'flex',title:'Waiting for appointment',sub:fmtDur((want-arrival)/60000)});
        arrival=want;
      }
    }
    cur=arrival;
    // dwell
    if(s.kind==='hotel'){
      const checkout=new Date(dayKey(cur)+'T'+HOTEL_CHECKOUT);
      // next morning if check-in already past checkout hour
      if(checkout.getTime()<=cur.getTime()) checkout.setDate(checkout.getDate()+1);
      iv.push({start:cur,end:checkout,cat:'sleep',title:`Overnight — ${s.label}`,sub:'',stopId:s.id});
      cur=checkout;
    } else if(VISIT_KINDS.has(s.kind)){
      const e=addMin(cur,s.duration||90);
      iv.push({start:cur,end:e,cat:'visit',title:s.label,sub:fmtDur(s.duration||90)+' visit',stopId:s.id});
      cur=e;
    } else { // airport/station added as a manual stop -> a wait
      const e=addMin(cur,s.duration||30);
      iv.push({start:cur,end:e,cat:'wait',title:s.label,sub:fmtDur(s.duration||30),stopId:s.id});
      cur=e;
    }
    s._arrival=arrival; s._depart=cur;   // stash for the list read-out
  });
  return {iv,legInfo,warn,end:cur};
}

/* ── render: itinerary list ────────────────────────────────── */
function renderStops(res){
  const box=document.getElementById('stops');
  if(!stops.length){ box.innerHTML='<div class="empty">No stops yet.<br>Add a mill, office, airport or hotel above — or <a href="#" onclick="loadDemo();return false">load the demo trip</a>.</div>'; return; }
  box.innerHTML='';
  stops.forEach((s,i)=>{
    if(i>0){
      const li=res.legInfo[s.id]||{};

      leg.innerHTML=`<span class="leg-label">Travel</span>
        <span class="modebtns">
          <button class="${s.mode==='car'?'on':''}" onclick="setMode('${s.id}','car')" title="Drive">${MODE_ICONS.car}Car</button>
          <button class="${s.mode==='plane'?'on':''}" onclick="setMode('${s.id}','plane')" title="Fly">${MODE_ICONS.plane}Plane</button>

      box.appendChild(leg);
    }
    const el=document.createElement('div'); el.className='stop'; el.draggable=true; el.dataset.id=s.id;
    const isVisit=VISIT_KINDS.has(s.kind);
    el.innerHTML=`
      <span class="handle" title="Drag to reorder">⋮⋮</span>
      <span class="ic" style="background:${KIND_COLOR[s.kind]}">${ICONS[s.kind]}</span>
      <div class="main">
        <input class="nm" value="${esc(s.label)}" onchange="setLabel('${s.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()" title="Click to rename this stop" spellcheck="false">
        <div class="meta">
          <select onchange="setKind('${s.id}',this.value)">
            ${Object.keys(KIND_LABEL).map(k=>`<option value="${k}" ${k===s.kind?'selected':''}>${KIND_LABEL[k]}</option>`).join('')}
          </select>
          ${isVisit?`
            <select onchange="setTiming('${s.id}',this.value)">
              <option value="flex" ${s.timing==='flex'?'selected':''}>Flex</option>
              <option value="fixed" ${s.timing==='fixed'?'selected':''}>Fixed</option>
            </select>
            ${s.timing==='fixed'?`<input type="time" value="${s.arriveBy||'09:00'}" onchange="setArriveBy('${s.id}',this.value)" title="Appointment time">`:''}
            <input class="dur mono" type="number" min="0" step="15" value="${s.duration||90}" onchange="setDuration('${s.id}',this.value)" title="Visit minutes"><span class="t">min</span>
          `:s.kind==='hotel'?`<span class="chip-fixed">overnight → ${HOTEL_CHECKOUT}</span>`:`
            <input class="dur mono" type="number" min="0" step="15" value="${s.duration||30}" onchange="setDuration('${s.id}',this.value)"><span class="t">min wait</span>`}
          ${s.seg?`<span class="seg-pin" title="Pinned to segment ${esc(s.seg)} (overrides its ${esc(nearestAirport(s).iata)} catchment) — click × to reset to auto">${PIN_SVG}${esc(s.seg)}<span class="seg-x" onclick="clearSeg('${s.id}')">×</span></span>`:''}
        </div>
        ${s._arrival?`<div class="times">${fmtTime(s._arrival)}–${fmtTime(s._depart)} · ${fmtDayLabel(s._arrival)}</div>`:''}
        ${res.warn[s.id]?`<div class="warn">⚠ ${esc(res.warn[s.id])}</div>`:''}
      </div>
      <span class="rowbtns">
        <button class="x" onclick="removeStop('${s.id}')" title="Remove">×</button>
        <button class="dup" onclick="duplicateStop('${s.id}')" title="Duplicate this stop (or Ctrl-drag)">⧉</button>
      </span>`;
    wireDnD(el);
    box.appendChild(el);
  });
  drawClusterBars(box);
}
/* effective segment of a stop = a manual pin (s.seg) if set, else its nearest-airport
   catchment. Lets you drag an activity into another segment "for organisation" and
   have it stay there regardless of geography. */
function effSeg(s){ return s.seg || nearestAirport(s).iata; }
/* consecutive stops sharing the same effective segment = one base block.
   Returns [start,end] index ranges. */
function airportClusters(){
  const cl=[]; if(!stops.length) return cl;
  let start=0;
  for(let i=1;i<stops.length;i++){
    if(effSeg(stops[i]) !== effSeg(stops[i-1])){ cl.push([start,i-1]); start=i; }
  }
  cl.push([start,stops.length-1]); return cl;
}
/* vertical bar grouping each base block, labelled with the segment key (+ hotel if any) */
function drawClusterBars(box){
  box.querySelectorAll('.cluster-bar,.cluster-lbl').forEach(x=>x.remove());
  airportClusters().forEach(([a,b])=>{
    if(b<=a) return;                                    // ≥2 stops to form a group
    const f=box.querySelector(`.stop[data-id="${stops[a].id}"]`);
    const l=box.querySelector(`.stop[data-id="${stops[b].id}"]`);
    if(!f||!l) return;
    const top=f.offsetTop, h=l.offsetTop+l.offsetHeight-top;
    const iata=effSeg(stops[a]);
    const pinned=stops.slice(a,b+1).some(s=>s.seg);     // block contains a manually-pinned stop
    let hotel=null; for(let k=a;k<=b;k++){ if(stops[k].kind==='hotel'){ hotel=stops[k].label; break; } }
    const gids=stops.slice(a,b+1).map(s=>s.id);
    const tip=`Segment ${iata}`+(hotel?` · ${hotel}`:'')+` — ${b-a+1} stops · drag the bar to move the whole block`+(pinned?' · contains manually-pinned stops':'');
    const bar=document.createElement('div'); bar.className='cluster-bar'+(pinned?' pinned':'');
    bar.style.top=top+'px'; bar.style.height=h+'px'; bar.title=tip;
    wireGroupDrag(bar,gids); box.appendChild(bar);
    const lbl=document.createElement('div'); lbl.className='cluster-lbl';
    lbl.style.top=top+'px'; lbl.style.height=h+'px'; lbl.textContent=iata+(hotel?' · '+hotel:''); lbl.title=tip;
    wireGroupDrag(lbl,gids); box.appendChild(lbl);
  });
}
/* drag an entire airport-base block (all its stops) to a new position at once */
function wireGroupDrag(el,ids){
  el.draggable=true;
  el.addEventListener('dragstart',e=>{ dragGroupIds=ids.slice(); dragId=null; dragCopy=false;
    el.classList.add('gdrag'); e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain','group');}catch(_){}; e.stopPropagation(); });
  el.addEventListener('dragend',()=>{ el.classList.remove('gdrag'); dragGroupIds=null; clearDrop(); });
}
function moveGroup(ids,targetId,side){
  const set=new Set(ids);
  if(set.has(targetId)) return;                       // dropped inside the same block
  const block=stops.filter(s=>set.has(s.id));
  const rest=stops.filter(s=>!set.has(s.id));
  const idx=rest.findIndex(s=>s.id===targetId); if(idx<0) return;
  rest.splice(side==='above'?idx:idx+1,0,...block);
  stops=rest; redefaultModes(); recompute();
}

/* ── render: map ───────────────────────────────────────────── */
function renderMap(){
  const el=document.getElementById('map');
  if(typeof L==='undefined'){ el.innerHTML='<div class="map-off">Map needs a connection (Leaflet CDN). The planner still works offline.</div>'; return; }
  if(!map){
    map=L.map('map',{zoomControl:true,attributionControl:false}).setView([51.5,5.5],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    markerLayer=L.layerGroup().addTo(map); lineLayer=L.layerGroup().addTo(map);
  }
  markerLayer.clearLayers(); lineLayer.clearLayers();
  const pts=[];
  stops.forEach((s,i)=>{
    const html=`<div style="width:24px;height:24px;border-radius:50%;background:${KIND_COLOR[s.kind]};color:#fff;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff">${ICONS[s.kind]}</div>`;
    const icon=L.divIcon({html,className:'',iconSize:[24,24],iconAnchor:[12,12]});
    L.marker([s.lat,s.lon],{icon}).bindTooltip(`${i+1}. ${s.label}`).addTo(markerLayer);
    pts.push([s.lat,s.lon]);
  });
  for(let i=1;i<stops.length;i++){
    const plane=stops[i].mode==='plane';
    const geom=!plane && geomCache[roadKey(stops[i-1],stops[i])];
    if(geom){                                    // real road path (OSRM)
      L.polyline(geom,{color:'rgb(0,146,159)',weight:3,opacity:.75}).addTo(lineLayer);
    } else {                                     // straight line (plane leg, or road not fetched yet)
      L.polyline([pts[i-1],pts[i]],{color:plane?'rgb(1,94,107)':'rgb(0,146,159)',weight:2,
        dashArray:plane?'6,6':null,opacity:.8}).addTo(lineLayer);
    }
  }
  if(pts.length) map.fitBounds(pts,{padding:[40,40],maxZoom:9});
}

/* ── render: timeline ──────────────────────────────────────── */
function renderTimeline(res){
  const days=[];
  res.iv.forEach(v=>{ // split intervals per calendar day
    let s=new Date(v.start);
    while(s < v.end){
      const dEnd=new Date(dayKey(s)+'T00:00'); dEnd.setDate(dEnd.getDate()+1);
      const end=v.end<dEnd?v.end:dEnd;
      const k=dayKey(s);
      let day=days.find(d=>d.key===k); if(!day){day={key:k,date:new Date(dayKey(s)+'T00:00'),parts:[]};days.push(day);}
      day.parts.push({...v,start:new Date(s),end:new Date(end)});
      s=dEnd;
    }
  });
  days.sort((a,b)=>a.date-b.date);

  // day tabs
  const dt=document.getElementById('daytabs'); dt.innerHTML='';
  if(activeDay>=days.length) activeDay=0;
  days.forEach((d,idx)=>{
    const b=document.createElement('button'); b.className=idx===activeDay?'on':'';
    b.innerHTML=`Day ${idx+1} · <span class="d">${fmtDayLabel(d.date)}</span>`;
    b.onclick=()=>{activeDay=idx;renderTimeline(res);};
    dt.appendChild(b);
  });
  // total span
  const tt=document.getElementById('tlTotal');
  if(res.end){ const span=(res.end-startDateTime())/3600000;
    tt.textContent=`${days.length} day${days.length>1?'s':''} · ${span<24?fmtDur(span*60):(span/24).toFixed(1)+' days'} end-to-end`; }
  else tt.textContent='';

  const body=document.getElementById('tlbody');
  if(!days.length){ body.innerHTML='<div class="empty">Add stops to see the day-by-day timeline.</div>'; return; }
  const day=days[activeDay];
  // fill flex gaps between first & last activity of the day
  day.parts.sort((a,b)=>a.start-b.start);
  const filled=[];
  for(let i=0;i<day.parts.length;i++){
    if(i>0){ const gap=(day.parts[i].start-day.parts[i-1].end)/60000;
      if(gap>4) filled.push({start:new Date(day.parts[i-1].end),end:new Date(day.parts[i].start),cat:'flex',title:'Open / flex',sub:fmtDur(gap)}); }
    filled.push(day.parts[i]);
  }
  const t0=filled[0].start, t1=filled[filled.length-1].end;
  const startH=Math.floor((t0.getHours()*60+t0.getMinutes())/60);
  const endH=Math.ceil((t1.getHours()*60+t1.getMinutes()+(t1.getDate()!==t0.getDate()?1440:0))/60);
  const PXH=44;                    // px per hour
  const minOf=d=>(d.getHours()*60+d.getMinutes()) + (d.getDate()!==t0.getDate()?1440:0);
  const top=m=>((m-startH*60)/60)*PXH;
  const height=(endH-startH)*PXH+10;
  let html=`<div class="tlcol" style="height:${height}px">`;
  for(let h=startH;h<=endH;h++){
    html+=`<div class="tlgrid" style="top:${top(h*60)}px"></div><div class="tlhour" style="top:${top(h*60)}px">${pad(h%24)}:00</div>`;
  }
  filled.forEach(p=>{
    const a=minOf(p.start), b=minOf(p.end);
    const h=Math.max(14,((b-a)/60)*PXH-2);
    const short=h<26;
    html+=`<div class="block ${p.cat}" style="top:${top(a)}px;height:${h}px" title="${esc(p.title)} · ${fmtTime(p.start)}–${fmtTime(p.end)}">
      <span class="bt">${fmtTime(p.start)}–${fmtTime(p.end)}</span>
      ${short?'':`<span class="bl">${esc(p.title)}${p.sub?` · ${esc(p.sub)}`:''}</span>`}</div>`;
  });
  html+='</div>';
  body.innerHTML=html;
}

/* ── recompute all ─────────────────────────────────────────── */
function renderAll(){ const res=computeItinerary(); renderStops(res); renderMap(); renderTimeline(res); }
function recompute(){ renderAll(); save(); updateRoadStatus(); refreshRoads(); maybeRefreshMatrix(); }

/* ── road drive times + geometry ───────────────────────────────
   Default: OSRM demo server (key-free) — real road duration + distance + the route
   geometry drawn on the map, per consecutive car leg, cached by coord-pair.
   Optional: an OpenRouteService key uses the ORS matrix (all pairs in one call,
   authoritative for durations). Straight-line ÷CAR_KMH is the offline fallback.
   Client-side here; proxy both through the tsi-intel-api worker on merge. */
let roadCache={}, geomCache={}, roadSig='', roadSource='est', matrixBusy=false, roadsBusy=false;
function roadKey(a,b){ return a.lat.toFixed(4)+','+a.lon.toFixed(4)+'>'+b.lat.toFixed(4)+','+b.lon.toFixed(4); }
function getOrsKey(){ const el=document.getElementById('orsKey'); return el?(el.value||'').trim():''; }
function onOrsKey(){ roadSig=''; recompute(); }
function updateRoadStatus(){
  const el=document.getElementById('orsStatus'); if(!el) return;
  const key=getOrsKey();
  if(key){
    if(roadSource==='ors'){ el.className='hint2 live'; el.innerHTML='<b>Live road times</b> — OpenRouteService.'; }
    else { el.className='hint2'; el.textContent='Fetching OpenRouteService road times…'; }
    return;
  }
  if(roadSource==='osrm'){ el.className='hint2 live';
    el.innerHTML='<b>Live road times</b> — OSRM. Optional: paste a free '+
      '<a href="https://openrouteservice.org/dev/#/signup" target="_blank" rel="noopener">ORS key</a> to use OpenRouteService instead.'; return; }
  el.className='hint2';
  el.innerHTML=`Loading live road times… offline it falls back to <b>straight-line estimates</b> (÷ ${CAR_KMH} km/h, marked ~).`;
}
/* OSRM demo — per consecutive car leg, key-free; fills geometry + (unless ORS keyed) durations */
async function refreshRoads(){
  if(roadsBusy) return;
  const need=[];
  for(let i=1;i<stops.length;i++){ if(stops[i].mode!=='car') continue;
    const k=roadKey(stops[i-1],stops[i]); if(!geomCache[k]) need.push([stops[i-1],stops[i],k]); }
  if(!need.length) return;
  roadsBusy=true;
  try{
    for(const [a,bb,k] of need){
      const url=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${bb.lon},${bb.lat}?overview=full&geometries=geojson`;
      const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
      const d=await r.json(); const rt=d&&d.routes&&d.routes[0]; if(!rt) throw new Error('no route');
      geomCache[k]=rt.geometry.coordinates.map(c=>[c[1],c[0]]);              // [lon,lat] → [lat,lon]
      if(!getOrsKey() || !roadCache[k]) roadCache[k]={min:rt.duration/60, km:rt.distance/1000, src:'osrm'};
    }
    roadsBusy=false; if(roadSource!=='ors') roadSource='osrm'; updateRoadStatus(); renderAll();
  }catch(e){ roadsBusy=false; updateRoadStatus(); }                          // leave estimates in place offline
}
/* OpenRouteService matrix — optional key, all pairs in one POST, authoritative for durations */
async function maybeRefreshMatrix(){
  const key=getOrsKey();
  if(!key || stops.length<2 || matrixBusy) return;
  const coords=stops.map(s=>[s.lon,s.lat]);          // ORS wants [lon,lat]
  const sig=key+'|'+JSON.stringify(coords);
  if(sig===roadSig) return;
  roadSig=sig; matrixBusy=true; updateRoadStatus();
  try{
    const r=await fetch('https://api.openrouteservice.org/v2/matrix/driving-car',{
      method:'POST', headers:{'Authorization':key,'Content-Type':'application/json'},
      body:JSON.stringify({locations:coords,metrics:['duration','distance'],units:'m'})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(!d||!d.durations) throw new Error('no matrix');
    for(let i=0;i<stops.length;i++) for(let j=0;j<stops.length;j++){
      if(i===j) continue;
      const dur=d.durations[i][j]; if(dur==null) continue;
      const dist=d.distances?d.distances[i][j]:null;
      roadCache[roadKey(stops[i],stops[j])]={min:dur/60, km:(dist!=null?dist/1000:haversine(stops[i],stops[j])), src:'ors'};
    }
    matrixBusy=false; roadSource='ors'; updateRoadStatus(); renderAll();
    maybeRefreshMatrix();                              // catch any change made mid-fetch (no-op if sig unchanged)
  }catch(e){ matrixBusy=false; updateRoadStatus(); }   // keep roadSig so a bad key doesn't hammer
}

/* ── stop mutations ────────────────────────────────────────── */
function defaultMode(prev,s){ return haversine(prev,s)>500?'plane':'car'; }
function addStop(o){
  const s={id:'s'+(uid++),label:o.label,lat:+o.lat,lon:+o.lon,kind:o.kind||'place',
    timing:'flex',duration:VISIT_KINDS.has(o.kind||'place')?90:30,arriveBy:'09:00',mode:'car'};
  if(stops.length) s.mode=defaultMode(stops[stops.length-1],s);
  stops.push(s); recompute();
}
function removeStop(id){ stops=stops.filter(s=>s.id!==id); recompute(); }
function setMode(id,m){ const s=stops.find(x=>x.id===id); if(s){s.mode=m;recompute();} }
function setKind(id,k){ const s=stops.find(x=>x.id===id); if(s){s.kind=k;
  if(VISIT_KINDS.has(k)&&!s.duration)s.duration=90; recompute();} }
function setTiming(id,t){ const s=stops.find(x=>x.id===id); if(s){s.timing=t;recompute();} }
function setArriveBy(id,v){ const s=stops.find(x=>x.id===id); if(s){s.arriveBy=v;recompute();} }
function setDuration(id,v){ const s=stops.find(x=>x.id===id); if(s){s.duration=+v||0;recompute();} }
function setLabel(id,v){ const s=stops.find(x=>x.id===id); if(s){ const t=(v||'').trim(); if(t){s.label=t;recompute();} } }
function cloneStop(s){ const c={...s}; delete c._arrival; delete c._depart; c.id='s'+(uid++); return c; }
function duplicateStop(id){ const i=stops.findIndex(s=>s.id===id); if(i<0) return;
  stops.splice(i+1,0,cloneStop(stops[i])); recompute(); }

/* ── suggest order — nearest-neighbour over the travel-time matrix ──
   Keeps stop[0] as the origin; preserves the relative order of FIXED appointments
   (you can't get an optimiser to move a booked meeting); 2-opt polish when there
   are no fixed anchors. Uses real road times where cached, else haversine. */
function legCost(a,b){ const rc=roadCache[roadKey(a,b)]; return rc?rc.min:haversine(a,b)/CAR_KMH*60; }
function totalTravelMin(){ const res=computeItinerary();
  return stops.slice(1).reduce((t,s)=>t+((res.legInfo[s.id]&&res.legInfo[s.id].minutes)||0),0); }
function suggestOrder(){
  const note=document.getElementById('optNote');
  if(stops.length<3){ if(note){note.className='hint2';note.textContent='Add at least 3 stops to optimise.';} return; }
  const before=totalTravelMin();
  const origin=stops[0];
  const fixedSeq=stops.slice(1).filter(s=>s.timing==='fixed');   // relative order to preserve
  const remaining=stops.slice(1);
  const route=[origin]; let cur=origin, fi=0;
  while(remaining.length){
    const nextFixed = fi<fixedSeq.length ? fixedSeq[fi] : null;
    const allowed = remaining.filter(s=> s.timing!=='fixed' || s===nextFixed);
    let best=allowed[0], bc=Infinity;
    for(const s of allowed){ const c=legCost(cur,s); if(c<bc){bc=c;best=s;} }
    route.push(best); cur=best; remaining.splice(remaining.indexOf(best),1);
    if(best===nextFixed) fi++;
  }
  if(!fixedSeq.length) twoOpt(route);            // safe only without precedence constraints
  stops=route; redefaultModes();
  const after=totalTravelMin();
  recompute();
  if(note){
    const saved=before-after;
    if(saved>1){ note.className='hint2 live'; note.innerHTML=`Optimised — travel now <b>${fmtDur(after)}</b> (−${fmtDur(saved)}).`; }
    else { note.className='hint2'; note.textContent='Already close to optimal — no meaningful saving.'; }
  }
}
function twoOpt(route){
  const tot=r=>{ let t=0; for(let i=1;i<r.length;i++) t+=legCost(r[i-1],r[i]); return t; };
  let improved=true, guard=0;
  while(improved && guard++<50){ improved=false;
    for(let i=1;i<route.length-1;i++) for(let j=i+1;j<route.length;j++){
      const nr=route.slice(0,i).concat(route.slice(i,j+1).reverse(),route.slice(j+1));
      if(tot(nr)<tot(route)-1e-6){ for(let k=0;k<route.length;k++) route[k]=nr[k]; improved=true; }
    }
  }
}

/* ── drag & drop reorder — shows a "ghost line" at the insertion point ── */
let dragId=null, dragCopy=false, dragGroupIds=null;
function clearDrop(){ document.querySelectorAll('.stop.drop-above,.stop.drop-below')
  .forEach(x=>x.classList.remove('drop-above','drop-below')); }
function dropSide(el,e){ const r=el.getBoundingClientRect(); return (e.clientY-r.top)<r.height/2?'above':'below'; }
function redefaultModes(){ stops.forEach((s,i)=>{ if(i>0 && s.mode==='car' && haversine(stops[i-1],s)>500) s.mode='plane'; }); }
/* after a single-stop drop: adopt the effective segment of the neighbour it landed next to,
   so dropping into a block joins that block; clear the pin if it's naturally in that catchment */
function adoptSegment(m){
  const i=stops.indexOf(m); if(i<0) return;
  const nb = stops[i-1] || stops[i+1];
  const key = nb ? effSeg(nb) : null;
  m.seg = (key && key!==nearestAirport(m).iata) ? key : null;
}
function clearSeg(id){ const s=stops.find(x=>x.id===id); if(s){ s.seg=null; recompute(); } }
function wireDnD(el){
  el.addEventListener('dragstart',e=>{dragId=el.dataset.id;dragCopy=e.ctrlKey||e.metaKey||e.altKey;
    el.classList.add('drag');e.dataTransfer.effectAllowed='copyMove';});
  el.addEventListener('dragend',()=>{el.classList.remove('drag');clearDrop();dragCopy=false;});
  el.addEventListener('dragover',e=>{e.preventDefault();
    if(dragGroupIds){ if(dragGroupIds.includes(el.dataset.id)){clearDrop();return;}
      const side=dropSide(el,e); clearDrop(); el.classList.add('drop-'+side); return; }
    const copy=dragCopy||e.ctrlKey||e.metaKey||e.altKey; e.dataTransfer.dropEffect=copy?'copy':'move';
    if(!copy && el.dataset.id===dragId){clearDrop();return;}   // moving onto itself = no-op marker
    const side=dropSide(el,e); clearDrop(); el.classList.add('drop-'+side);});
  el.addEventListener('drop',e=>{e.preventDefault();
    const side=dropSide(el,e); clearDrop();
    if(dragGroupIds){ const g=dragGroupIds; dragGroupIds=null; moveGroup(g,el.dataset.id,side); return; }
    const copy=dragCopy||e.ctrlKey||e.metaKey||e.altKey;
    const from=stops.findIndex(s=>s.id===dragId), to=stops.findIndex(s=>s.id===el.dataset.id);
    if(from<0||to<0){return;}
    let insertAt = side==='above'?to:to+1;
    let moved;
    if(copy){                                             // Ctrl/Alt-drag → duplicate the stop
      moved=cloneStop(stops[from]); stops.splice(insertAt,0,moved);
    } else {
      const [m]=stops.splice(from,1);
      if(from<insertAt) insertAt--;                       // account for the removed item
      stops.splice(insertAt,0,m); moved=m;
    }
    adoptSegment(moved);                                  // pin to the segment it was dropped into
    redefaultModes(); recompute();
  });
}

/* ── geocode autocomplete (Photon — search-as-you-type by NAME or address) ── */
let geoTimer=null, geoSeq=0;
function detectKind(key,value){
  key=(key||'').toLowerCase(); value=(value||'').toLowerCase();
  if(key==='aeroway'||/aerodrome|airport|terminal/.test(value)) return 'airport';
  if(key==='railway'&&/station|halt|stop/.test(value)) return 'station';
  if(value==='station'&&/rail|train|subway|light_rail/.test(key)) return 'station';
  if((key==='tourism'||key==='building')&&/hotel|motel|hostel|guest_house|resort/.test(value)) return 'hotel';
  if(key==='office'||value==='office') return 'office';
  return 'place';
}
function photonLabel(p){
  return p.name || [p.street,p.housenumber].filter(Boolean).join(' ') || p.city || p.locality || 'Unnamed place';
}
function photonSub(p){
  const parts=[]; if(p.name&&p.street) parts.push(p.street);
  parts.push(p.district,p.city,p.state,p.country);
  return [...new Set(parts.filter(Boolean))].slice(0,3).join(', ');
}
function onGeoInput(){
  const q=document.getElementById('geo').value.trim();
  const ac=document.getElementById('ac');
  if(q.length<2){ ac.innerHTML='<div class="hint">Search by name or address — "Schiphol", "Motel One Düsseldorf", a mill, an office…</div>'; ac.classList.add('show'); return; }
  ac.innerHTML='<div class="hint">Searching…</div>'; ac.classList.add('show');
  clearTimeout(geoTimer);
  geoTimer=setTimeout(()=>runGeo(q),300);
}
async function runGeo(q){
  const seq=++geoSeq;
  try{
    const url=`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=8&lang=en`;
    const data=await (await fetch(url)).json();
    if(seq!==geoSeq) return;
    const ac=document.getElementById('ac');
    const rows=(data&&data.features)||[];
    if(!rows.length){ ac.innerHTML='<div class="hint">No matches.</div>'; return; }
    ac.innerHTML='';
    rows.forEach(f=>{
      const p=f.properties||{}, coords=(f.geometry||{}).coordinates||[];
      const lon=coords[0], lat=coords[1];
      if(lat==null||lon==null) return;
      const kind=detectKind(p.osm_key,p.osm_value);
      const name=photonLabel(p), sub=photonSub(p);
      const row=document.createElement('div'); row.className='row';
      row.innerHTML=`<span class="k" style="background:${KIND_COLOR[kind]}">${KIND_LABEL[kind]}</span>
        <span><div>${esc(name)}</div><div class="sub">${esc(sub)}</div></span>`;
      row.onclick=()=>{ addStop({label:name,lat,lon,kind});
        document.getElementById('geo').value=''; ac.classList.remove('show'); };
      ac.appendChild(row);
    });
  }catch(e){ document.getElementById('ac').innerHTML='<div class="hint">Geocoder unavailable (offline?).</div>'; }
}
document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrap')) document.getElementById('ac').classList.remove('show'); });

/* ── price popover (STUB — swap for server-side Google-Flights scraper) ── */
function showPrice(ev,id){
  ev.stopPropagation();

  const pop=document.getElementById('pop');
  if(!li||li.mode!=='plane'){ return; }
  const dep=li.dep, arr=li.arr;
  // deterministic mock fares seeded off the route so it feels stable

  const carriers=[['KL','KLM'],['LH','Lufthansa'],['HV','Transavia'],['FR','Ryanair'],['U2','easyJet']];
  const base=60+seed*25;
  const opts=[0,1,2].map(k=>{

    const dh=6+((seed+k*3)%12);
    return {car:c[1],code:c[0],time:`${pad(dh)}:${k%2?'40':'05'}`,price:base+k*40+(k===0?0:15)};
  }).sort((a,b)=>a.price-b.price);
  pop.innerHTML=`<button class="close" onclick="document.getElementById('pop').classList.remove('show')">×</button>
    <h4>${dep.iata} → ${arr.iata} · ${document.getElementById('startDate').value||todayISO()}</h4>
    ${opts.map(o=>`<div class="fl"><span class="car">${o.time} · ${o.car}</span><span class="pr">€${o.price}</span></div>`).join('')}
    <div class="stub">Stub data. Live: server-side Google-Flights fetch (incl. low-cost carriers).</div>`;
  pop.classList.add('show');
  const r=ev.target.getBoundingClientRect();
  pop.style.top=Math.min(r.bottom+6,window.innerHeight-220)+'px';
  pop.style.left=Math.min(r.left,window.innerWidth-280)+'px';
}

/* ── persistence — a named-trip library + per-trip options (localStorage) ──
   library = { trips:{id:trip}, order:[id…], currentId, orsKey }
   trip    = { id, name, updatedAt, settings:{startDate,startTime,bufPre,bufPost},
               stops:[…], options:[ {id,name,createdAt,travelMin,stops:[…]} ] } */
const LSK='tsi-trips';
let library={trips:{},order:[],currentId:null,orsKey:''};
function newId(p){ return p+Date.now().toString(36)+Math.floor(Math.random()*46656).toString(36); }
function blankTrip(name){ return {id:newId('t'),name:name||'Untitled trip',updatedAt:Date.now(),
  settings:{startDate:todayISO(),startTime:'08:00',bufPre:'90',bufPost:'30'},stops:[],options:[]}; }
function currentTrip(){ return library.trips[library.currentId]; }
function stripStops(arr){ return (arr||[]).map(s=>{ const c={...s}; delete c._arrival; delete c._depart; return c; }); }

function saveLibrary(){ try{ localStorage.setItem(LSK,JSON.stringify(library)); }catch(e){} }
function readWorkingIntoTrip(){
  const t=currentTrip(); if(!t) return;
  t.name=document.getElementById('tripName').value||t.name;
  t.settings={ startDate:document.getElementById('startDate').value, startTime:document.getElementById('startTime').value,
    bufPre:document.getElementById('bufPre').value, bufPost:document.getElementById('bufPost').value };
  t.stops=stripStops(stops); t.updatedAt=Date.now();
}
function applyTripToWorking(t){
  document.getElementById('tripName').value=t.name||'';
  document.getElementById('startDate').value=(t.settings&&t.settings.startDate)||todayISO();
  document.getElementById('startTime').value=(t.settings&&t.settings.startTime)||'08:00';
  document.getElementById('bufPre').value=(t.settings&&t.settings.bufPre)||'90';
  document.getElementById('bufPost').value=(t.settings&&t.settings.bufPost)||'30';
  stops=stripStops(t.stops);
  uid=Math.max(1,...stops.map(s=>parseInt(String(s.id).replace(/\D/g,''),10)||0))+1;
  roadSig=''; recompute(); renderTripSelect(); renderOptions();
}
/* save() is called on every recompute → keeps the current trip current */
function save(){ readWorkingIntoTrip(); library.orsKey=getOrsKey(); saveLibrary(); renderSavedNote(); }
function renderSavedNote(){ const el=document.getElementById('savedNote'); const t=currentTrip();
  if(el&&t) el.textContent=`${Object.keys(library.trips).length} trip(s) saved · ${t.stops.length} stops in this one`; }
function onTripName(){ const t=currentTrip(); if(t) t.name=document.getElementById('tripName').value;
  saveLibrary(); renderTripSelect(); }
function renderTripSelect(){ const sel=document.getElementById('tripSelect'); if(!sel) return;
  sel.innerHTML=library.order.map(id=>{ const t=library.trips[id]; if(!t) return '';
    return `<option value="${id}" ${id===library.currentId?'selected':''}>${esc(t.name)} (${t.stops.length})</option>`; }).join(''); }

function switchTrip(id){ if(id===library.currentId||!library.trips[id]) return;
  readWorkingIntoTrip(); saveLibrary(); library.currentId=id; applyTripToWorking(library.trips[id]); saveLibrary(); }
function newTrip(){ readWorkingIntoTrip(); saveLibrary();
  const t=blankTrip('Untitled trip'); library.trips[t.id]=t; library.order.push(t.id); library.currentId=t.id;
  applyTripToWorking(t); saveLibrary(); }
function saveAsNewTrip(){ readWorkingIntoTrip();
  const nm=prompt('Save current trip as:', (currentTrip()?currentTrip().name:'Trip')+' copy'); if(nm===null) return;
  const cur=currentTrip(), t=blankTrip(nm.trim()||'Trip copy');
  t.settings={...cur.settings}; t.stops=stripStops(cur.stops);
  t.options=(cur.options||[]).map(o=>({...o,stops:stripStops(o.stops)}));
  library.trips[t.id]=t; library.order.push(t.id); library.currentId=t.id;
  applyTripToWorking(t); saveLibrary(); }
function duplicateTrip(){ readWorkingIntoTrip(); const cur=currentTrip(); if(!cur) return;
  const t=blankTrip(cur.name+' copy'); t.settings={...cur.settings}; t.stops=stripStops(cur.stops);
  t.options=(cur.options||[]).map(o=>({...o,stops:stripStops(o.stops)}));
  library.trips[t.id]=t; library.order.push(t.id); library.currentId=t.id;
  applyTripToWorking(t); saveLibrary(); }
function deleteTrip(){ const id=library.currentId; if(!id) return;
  if(library.order.length<=1){ alert('This is your only trip — start a new one first.'); return; }
  if(!confirm('Delete trip "'+library.trips[id].name+'"? This cannot be undone.')) return;
  delete library.trips[id]; library.order=library.order.filter(x=>x!==id);
  library.currentId=library.order[0]; applyTripToWorking(library.trips[library.currentId]); saveLibrary(); }

/* ── itinerary options (variant snapshots within a trip) ───── */
function saveOption(){ const t=currentTrip(); if(!t) return; readWorkingIntoTrip();
  const nm=prompt('Name this itinerary option:', 'Option '+(((t.options||[]).length)+1)); if(nm===null) return;
  (t.options=t.options||[]).push({id:newId('o'),name:nm.trim()||('Option '+((t.options.length)+1)),
    createdAt:Date.now(), travelMin:Math.round(totalTravelMin()), stops:stripStops(stops)});
  saveLibrary(); renderOptions(); }
function loadOption(oid){ const t=currentTrip(); const o=(t&&t.options||[]).find(x=>x.id===oid); if(!o) return;
  stops=stripStops(o.stops); roadSig=''; recompute(); }
function deleteOption(oid){ const t=currentTrip(); if(!t) return;
  t.options=(t.options||[]).filter(x=>x.id!==oid); saveLibrary(); renderOptions(); }
function renderOptions(){ const box=document.getElementById('optionsBar'); if(!box) return;
  const t=currentTrip(), opts=(t&&t.options)||[];
  box.innerHTML=opts.map(o=>`<span class="opt-chip" onclick="loadOption('${o.id}')" title="Load this saved arrangement">`+
      `${esc(o.name)} <span class="opt-t">${fmtDur(o.travelMin||0)}</span>`+
      `<span class="opt-x" onclick="event.stopPropagation();deleteOption('${o.id}')" title="Delete option">×</span></span>`).join('')
    + `<button class="opt-add" onclick="saveOption()" title="Snapshot the current order/modes/timing as an option to compare">+ Save option</button>`; }
function loadLibrary(){
  try{ const d=JSON.parse(localStorage.getItem(LSK)||'null');
    if(d&&d.trips&&Object.keys(d.trips).length){
      library=Object.assign({trips:{},order:[],currentId:null,orsKey:''},d);
      if(!library.order||!library.order.length) library.order=Object.keys(library.trips);
      library.order=library.order.filter(id=>library.trips[id]);
      if(!library.currentId||!library.trips[library.currentId]) library.currentId=library.order[0];
      return true; } }catch(e){}
  try{ const old=JSON.parse(localStorage.getItem('tsi-trip')||'null');   // migrate the old single-trip format
    if(old&&old.stops&&old.stops.length){ const t=blankTrip(old.name||'My trip');
      t.settings={startDate:old.startDate||todayISO(),startTime:old.startTime||'08:00',bufPre:old.bufPre||'90',bufPost:old.bufPost||'30'};
      t.stops=stripStops(old.stops); library={trips:{[t.id]:t},order:[t.id],currentId:t.id,orsKey:old.orsKey||''};
      return true; } }catch(e){}
  return false;
}

/* ── demo trip ─────────────────────────────────────────────── */
function loadDemo(){
  document.getElementById('startDate').value=todayISO();
  document.getElementById('startTime').value='08:00';
  uid=1; stops=[];
  const seq=[
    {...MOCK_MILLS[0],kind:'mill'},                                   // Düsseldorf
    {...MOCK_MILLS[3],kind:'mill'},                                   // Duisburg
    {...MOCK_MILLS[1],kind:'mill'},                                   // Rotterdam (fixed 14:00 below)
    {...MOCK_MILLS[2],kind:'mill'},                                   // Antwerp
    {label:'Hotel — Antwerp',lat:51.2170,lon:4.4210,kind:'hotel'},   // overnight, end of day 1
    {...MOCK_MILLS[5],kind:'mill'}                                    // Bremen (day 2, far -> plane)
  ];
  seq.forEach(o=>addStop({label:o.label,lat:o.lat,lon:o.lon,kind:o.kind}));
  // make one a fixed appointment to show the conflict/wait logic
  const rot=stops.find(s=>/Rotterdam/.test(s.label)); if(rot){rot.timing='fixed';rot.arriveBy='14:00';}
  // fly the final long leg so the airport gateways + flight buffers + Get-price show
  const bre=stops.find(s=>/Bremen/.test(s.label)); if(bre)bre.mode='plane';
  recompute();
}

/* ── theme ─────────────────────────────────────────────────── */
function toggleTheme(){
  const on=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',on?'light':'dark');
  document.getElementById('themebtn').textContent=on?'Dark':'Light';
  if(map) setTimeout(()=>map.invalidateSize(),50);
  localStorage.setItem('tsi-theme',on?'light':'dark');
}

/* ── util ──────────────────────────────────────────────────── */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── boot ──────────────────────────────────────────────────── */
(function init(){
  if(localStorage.getItem('tsi-theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themebtn').textContent='Light'; }
  if(!document.getElementById('startDate').value) document.getElementById('startDate').value=todayISO();
  if(loadLibrary()){
    if(library.orsKey) document.getElementById('orsKey').value=library.orsKey;
    applyTripToWorking(currentTrip());
  } else {
    const t=blankTrip('Mill visits — DE/NL');
    library={trips:{[t.id]:t},order:[t.id],currentId:t.id,orsKey:''};
    loadDemo();                       // fills the working itinerary; recompute()→save() persists it into this trip
    renderTripSelect(); renderOptions();
  }
  window.addEventListener('resize',()=>{ if(map) map.invalidateSize(); });
})();
</script>
